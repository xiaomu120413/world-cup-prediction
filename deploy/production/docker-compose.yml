services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: worldcup_prediction
      POSTGRES_USER: worldcup
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=128MB"
      - "-c"
      - "effective_cache_size=512MB"
      - "-c"
      - "work_mem=4MB"
      - "-c"
      - "maintenance_work_mem=64MB"
      - "-c"
      - "max_connections=30"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U worldcup -d worldcup_prediction"]
      interval: 10s
      timeout: 5s
      retries: 12
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - "redis-server"
      - "--save"
      - ""
      - "--appendonly"
      - "no"
      - "--maxmemory"
      - "128mb"
      - "--maxmemory-policy"
      - "allkeys-lru"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12

  api:
    build:
      context: ../../services/api
    restart: unless-stopped
    environment:
      APP_NAME: World Cup Prediction API
      APP_VERSION: ${APP_VERSION:-0.1.0}
      API_VERSION: v1
      ENVIRONMENT: production
      ADMIN_TOKEN: ${ADMIN_TOKEN}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://servicewechat.com}
      DATA_BACKEND: database
      DATABASE_URL: postgresql+psycopg://worldcup:${POSTGRES_PASSWORD}@postgres:5432/worldcup_prediction
      CACHE_ENABLED: "true"
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS:-300}
      REDIS_URL: redis://redis:6379/0
      RUN_MIGRATIONS: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8001/health"]
      interval: 30s
      timeout: 5s
      retries: 5

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      API_SITE_ADDRESS: ${API_SITE_ADDRESS:-:80}
      TLS_EMAIL: ${TLS_EMAIL:-}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
